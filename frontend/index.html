<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swaya.me - Interactive Quiz Platform</title>
    <meta name="description" content="Create and run live interactive quizzes and polls. Audiences join instantly — no app needed." />

    <!-- Open Graph -->
    <meta property="og:type"         content="website" />
    <meta property="og:url"          content="https://www.swaya.me/" />
    <meta property="og:title"        content="Swaya.me — Live Interactive Quizzes &amp; Polls" />
    <meta property="og:description"  content="Create and run live interactive quizzes and polls. Audiences join instantly — no app needed." />
    <meta property="og:image"        content="https://www.swaya.me/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name"    content="Swaya.me" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Swaya.me — Live Interactive Quizzes &amp; Polls" />
    <meta name="twitter:description" content="Create and run live interactive quizzes and polls. Audiences join instantly — no app needed." />
    <meta name="twitter:image"       content="https://www.swaya.me/og-image.png" />

    <!-- Google Analytics — production only -->
    <script>
      if (window.location.hostname === 'www.swaya.me') {
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-NN80Y170WP';
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-NN80Y170WP');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var cacheBuster = Date.now().toString()
        var links = document.querySelectorAll('link[rel="stylesheet"]')
        links.forEach(function (link) {
          var href = link.getAttribute('href')
          if (!href) return
          var separator = href.indexOf('?') === -1 ? '?' : '&'
          link.setAttribute('href', href + separator + 'v=' + cacheBuster)
        })
      })()
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
